name: Release Drafter

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-drafter:
    name: Release Drafter
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: release-drafter/release-drafter@5de93583980a40bd78603b6dfdcda5b4df377b32 # v7
        id: drafter

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-04
        with:
          toolchain: stable

      - name: Install cargo-edit
        uses: taiki-e/install-action@055f5df8c3f65ea01cd41e9dc855becd88953486 # v2.75.18
        with:
          tool: cargo-edit

      - name: Bump version
        env:
          VERSION: ${{ steps.drafter.outputs.resolved_version }}
        # Note: `cargo set-version` needs network access — it invokes
        # `cargo metadata` internally, which fails with `--offline` or
        # `--locked` on a clean CI cache. The tool only rewrites workspace
        # member version strings in Cargo.toml and the matching entries in
        # Cargo.lock; it does not change any dependency pins. The scoped
        # `git add` in the Commit step is what guarantees unrelated files
        # can't sneak into a release commit.
        run: cargo set-version "$VERSION"

      - name: Commit changes
        env:
          VERSION: ${{ steps.drafter.outputs.resolved_version }}
        run: |
          # Commit exactly the files `cargo set-version` can touch: the root
          # Cargo.lock plus each workspace member's Cargo.toml. The previous
          # `git add Cargo.toml Cargo.lock` missed the member manifests since
          # the root Cargo.toml is virtual (no version). Scoped explicitly so
          # future workflow steps can't sneak unrelated changes into a "Bump
          # version" commit.
          paths=(Cargo.lock crates/*/Cargo.toml)
          if ! git diff --quiet -- "${paths[@]}"; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add -- "${paths[@]}"
            git commit -m "Bump version to ${VERSION} [skip ci]"
            git push
          fi
